laravel: '@testbench'

providers:
    - DragonCode\LaravelRequestTracker\LaravelRequestTrackerServiceProvider
    - Workbench\App\Providers\PolicyServiceProvider

workbench:
    install: true
    health: false
    discovers:
        web: false
        api: true
        config: true
        commands: true
        components: false
        factories: true
        views: false
    build:
        - create-sqlite-db
        - db-wipe
        - migrate-fresh

migrations:
    - workbench/database/migrations
